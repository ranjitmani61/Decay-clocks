services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dc
      POSTGRES_PASSWORD: dcpass
      POSTGRES_DB: decay_clocks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../docker/postgres:/docker-entrypoint-initdb.d   # create temporal user/db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dc -d decay_clocks"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  temporal:
    image: temporalio/auto-setup:1.25.0
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
