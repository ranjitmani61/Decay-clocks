services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dc
      POSTGRES_PASSWORD: dcpass
      POSTGRES_DB: decay_clocks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/init-temporal.sql:/docker-entrypoint-initdb.d/init-temporal.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dc -d decay_clocks"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  temporal:
    image: temporalio/auto-setup:1.25.0
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://dc:dcpass@postgres:5432/decay_clocks
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_HOST=temporal:7233
    depends_on:
      - postgres
      - redis
      - temporal
    command: uvicorn src.core.api.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://dc:dcpass@postgres:5432/decay_clocks
      - TEMPORAL_HOST=temporal:7233
    depends_on:
      - postgres
      - temporal
    command: python src/worker/run_worker.py

volumes:
  pgdata:
