name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dc
          POSTGRES_PASSWORD: dcpass
          POSTGRES_DB: decay_clocks
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dc -d decay_clocks"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      temporal:
        image: temporalio/auto-setup:1.25.0
        env:
          DB: postgres12
          DB_PORT: 5432
          POSTGRES_USER: temporal
          POSTGRES_PWD: temporal
          POSTGRES_SEEDS: postgres
        ports:
          - 7233:7233

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libpq-dev gcc
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prepare test databases
        run: |
          PGPASSWORD=dcpass psql -h localhost -U dc -d decay_clocks -c "CREATE DATABASE decay_clocks_test;" || true
          PGPASSWORD=dcpass psql -h localhost -U dc -d decay_clocks -c "CREATE USER temporal WITH PASSWORD 'temporal';" || true
          PGPASSWORD=dcpass psql -h localhost -U dc -d decay_clocks -c "CREATE DATABASE temporal OWNER temporal;" || true
          PGPASSWORD=dcpass psql -h localhost -U dc -d decay_clocks -c "GRANT ALL ON DATABASE temporal TO temporal;" || true

      - name: Lint with ruff (warnings only)
        run: ruff check src tests || true

      - name: Type check with mypy (warnings only)
        run: mypy src || true

      - name: Run tests
        run: pytest -v --cov=src --cov-report=xml

      - name: Upload coverage (optional)
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        if: ${{ always() }}
